Name: Autogen

on:
  workflow_dispatch:
    inputs:
      payload:
        required: true
        description: 'Direct URL to autogen payload zip'

permissions:
  contents: write

jobs:
  autogen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clear Android SDK cache
        run: |
          rm -rf /usr/local/lib/android/sdk/platforms/android-35 || true
          rm -rf ~/.android || true
          echo "SDK cache cleared"

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches || true
          rm -rf .gradle || true
          echo "Gradle cache cleared"

      - name: Fetch payload
        run: |
          mkdir -p ./autogen/input/
          curl -fL# "${{ inputs.payload }}" -o ./autogen/input/payload.zip || true
          echo "Payload download attempt completed"
          ls -la ./autogen/input/ || echo "Input directory listing failed"

      - name: Unzip payload
        run: |
          if [ -f ./autogen/input/payload.zip ]; then
            unzip -o ./autogen/input/payload.zip -d ./autogen/input/
            rm ./autogen/input/payload.zip
            echo "Unzip completed successfully"
          else
            echo "ERROR: payload.zip not found!"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xmlstarlet

      - name: Run autogen
        run: |
          echo "Starting autogen..."
          chmod +x ./autogen/generate
          ./autogen/generate
          echo "Autogen completed"

      - name: Compress outputs
        run: |
          echo "Compressing outputs..."
          zip -vr9 ./autogen/output/output.zip ./autogen/output/*
          echo "Compression completed"

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%dT%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "ludere-autogen-${{ steps.date.outputs.date }}"
          name: "Ludere Autogen ${{ steps.date.outputs.date }}"
          files: ./autogen/output/output.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
